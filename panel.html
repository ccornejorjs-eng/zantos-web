<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZANTOS · Panel de casos</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-shell">
  <header class="topbar">
    <div>
      <div class="brand">ZANTOS</div>
      <div class="subtitle">Panel profesional de casos</div>
    </div>
    <nav class="nav-links">
      <a href="index.html">Formulario</a>
      <a href="panel.html">Panel</a>
    </nav>
  </header>

  <main>
    <section class="card hero">
      <h1>Casos recibidos</h1>
      <p>Casos creados desde el formulario y guardados en Supabase.</p>
    </section>

    <section id="estadoCarga" class="card">
      <p>Cargando casos...</p>
    </section>

    <section id="casosContainer"></section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = 'https://wzsyybrqycqcmouhmlzy.supabase.co';
const supabaseKey = 'sb_publishable_V5e8LxY7my69nDSOUYRGsA_UxvDzPrl';
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

const container = document.getElementById('casosContainer');
const estadoCarga = document.getElementById('estadoCarga');

let cases = [];

function render() {
  estadoCarga.style.display = 'none';

  if (!cases.length) {
    container.innerHTML = '<section class="card"><p>No hay casos aún.</p></section>';
    return;
  }

  container.innerHTML = cases.map((caso, i) => `
    <section class="card">
      <h2>${caso.nombre_perro || '-'}</h2>

      <p style="font-size:18px;font-weight:600;">
        ${caso.motivo_consulta || '-'}
      </p>

      <p><strong>Tutor:</strong> ${caso.nombre_tutor || '-'}</p>
      <p><strong>Plan:</strong> ${caso.plan_sugerido || '-'}</p>
      <p><strong>Estado:</strong> ${caso.estado || '-'}</p>
      <p><strong>Fecha:</strong> ${new Date(caso.fecha_creacion).toLocaleString()}</p>

      <div class="row actions">
        <button onclick="abrirFicha(${i})">Abrir ficha</button>
        <button onclick="eliminarCaso('${caso.id}')">Eliminar</button>
      </div>
    </section>
  `).join('');
}

async function cargarCasos() {
  const { data, error } = await supabaseClient
    .from('casos')
    .select('*')
    .order('fecha_creacion', { ascending: false });

  if (error) {
    console.error(error);
    estadoCarga.innerHTML = '<p>Error al cargar casos</p>';
    return;
  }

  cases = data || [];
  render();
}

window.abrirFicha = function(i) {
  const caso = cases[i];
  if (!caso) return;
  window.location.href = ficha.html?id=${caso.id};
};

window.eliminarCaso = async function(id) {
  if (!confirm('¿Eliminar caso?')) return;

  const { error } = await supabaseClient
    .from('casos')
    .delete()
    .eq('id', id);

  if (error) {
    alert('Error al eliminar');
    return;
  }

  cargarCasos();
};

cargarCasos();
</script>

</body>
</html>
