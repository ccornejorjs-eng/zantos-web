<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZANTOS · Formulario</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="app-shell">

<header class="topbar">
<div>
<div class="brand">ZANTOS</div>
<div class="subtitle">Formulario de ingreso inicial del caso</div>
</div>

<nav class="nav-links">
<a href="index.html">Formulario</a>
<a href="panel.html">Panel</a>
</nav>
</header>

<main>

<section class="card hero">
<h1>Evaluación inicial</h1>
<p>Completa este formulario antes de iniciar el proceso. La información se transforma en un caso estructurado para ZANTOS.</p>
</section>

<form id="caseForm">

<section class="card">
<h2>1. Datos del perro</h2>

<label>Nombre del perro *</label>
<input type="text" id="nombre_perro" required>

<label>Edad *</label>
<div class="grid-2">
<input type="number" id="edad_anios" placeholder="Años">
<input type="number" id="edad_meses" placeholder="Meses">
</div>

<label>Raza o mestizo *</label>
<input type="text" id="raza" required>

<label>Sexo *</label>
<select id="sexo" required>
<option value="">Seleccionar</option>
<option>Macho</option>
<option>Hembra</option>
</select>

<label>¿Está esterilizado? *</label>
<select id="esterilizado" required>
<option value="">Seleccionar</option>
<option>Sí</option>
<option>No</option>
</select>
</section>

<section class="card">
<h2>2. Datos del responsable</h2>

<label>Nombre *</label>
<input type="text" id="nombre_tutor" required>

<label>Teléfono *</label>
<input type="text" id="telefono" required>

<label>Correo *</label>
<input type="email" id="email" required>

<label>País *</label>
<input type="text" id="pais" value="Chile">

<label>Comuna *</label>
<input type="text" id="comuna">
</section>

<section class="card">
<h2>3. Evaluación conductual</h2>

<label>Motivo de consulta *</label>
<input type="text" id="motivo_consulta" required>

<label>Descripción del problema</label>
<textarea id="descripcion_problema"></textarea>

<label>Frecuencia</label>
<input type="text" id="frecuencia">

<label>Intensidad</label>
<input type="text" id="intensidad">
</section>

<section class="card">
<h2>4. Gestión del caso</h2>

<label>Estado</label>
<input type="text" id="estado" value="nuevo">

<label>Subestado</label>
<input type="text" id="subestado" value="pendiente_revision">

<label>Plan sugerido</label>
<input type="text" id="plan_sugerido">
</section>

<section class="card">
<button type="submit">Guardar caso</button>
</section>

</form>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
supabaseUrl = 'https://wzsyybrqycqcmouhmlzy.supabase.co';
const supabaseKey = 'sb_publishable_V5e8LxY7my69nDSOUYRGsA_UxvDzPrl';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById('caseForm').addEventListener('submit', async (e) => {
e.preventDefault();

const data = {
nombre_perro: document.getElementById('nombre_perro').value,
edad: document.getElementById('edad_anios').value,
raza: document.getElementById('raza').value,
sexo: document.getElementById('sexo').value,
esterilizado: document.getElementById('esterilizado').value,

nombre_tutor: document.getElementById('nombre_tutor').value,
telefono: document.getElementById('telefono').value,
email: document.getElementById('email').value,
pais: document.getElementById('pais').value,
comuna: document.getElementById('comuna').value,

motivo_consulta: document.getElementById('motivo_consulta').value,
descripcion_problema: document.getElementById('descripcion_problema').value,
frecuencia: document.getElementById('frecuencia').value,
intensidad: document.getElementById('intensidad').value,

estado: document.getElementById('estado').value,
subestado: document.getElementById('subestado').value,
plan_sugerido: document.getElementById('plan_sugerido').value
};

const { error } = await supabase.from('casos').insert([data]);

if (error) {
alert('Error al guardar el caso');
console.error(error);
return;
}

alert('Caso guardado correctamente');
document.getElementById('caseForm').reset();
});
</script>

</body>
</html>
